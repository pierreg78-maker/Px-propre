// ---------------------------------------------------------------
// SIGNALEMENT DE PROBLEME : lien vers un Google Form pre-rempli.
// Remplace ces valeurs par les tiennes une fois le formulaire cree
// (Google Form -> 3 points -> "Obtenir le lien prerempli").
// ---------------------------------------------------------------
const GOOGLE_FORM = {
  baseUrl: "https://docs.google.com/forms/d/e/1FAIpQLSfXcceLSn-s32U9gohMG2yjgA0oQuMfIysUDMOXdXuI9wD-yw/viewform",
  entryLieu: "entry.237831157",   // champ "Lieu concerne"
  entryGps: "entry.348540032"     // champ "Coordonnees GPS"
};

function ouvrirSignalement(nom, lat, lon) {
  const url = new URL(GOOGLE_FORM.baseUrl);
  url.searchParams.set(GOOGLE_FORM.entryLieu, nom);
  url.searchParams.set(GOOGLE_FORM.entryGps, `${lat.toFixed(5)},${lon.toFixed(5)}`);
  window.open(url.toString(), '_blank');
}

// ---------------------------------------------------------------
// AJOUT D'UN POINT D'APPORT MANQUANT : formulaire distinct du
// signalement de probleme. A remplacer une fois le formulaire cree
// (memes etapes que GOOGLE_FORM ci-dessus).
// ---------------------------------------------------------------
const GOOGLE_FORM_NOUVEAU_POINT = {
  baseUrl: "https://docs.google.com/forms/d/e/REMPLACER_PAR_TON_ID/viewform",
  entryGps: "entry.REMPLACER"   // champ "Coordonnees GPS"
};

function ouvrirAjoutPoint() {
  if (!userPosition) return;
  const url = new URL(GOOGLE_FORM_NOUVEAU_POINT.baseUrl);
  url.searchParams.set(GOOGLE_FORM_NOUVEAU_POINT.entryGps, `${userPosition.lat.toFixed(5)},${userPosition.lon.toFixed(5)}`);

}

// des squares/places -- a affiner sur place si besoin d'une precision au metre pres)

  { id: 2, nom: "Canisite - Place Saint-Martin", rue: "Place Saint-Martin", code_postal: "24000", ville: "Périgueux", latitude: 45.187725, longitude: 0.711561 },
  { id: 3, nom: "Canisite - Place du Thouin", rue: "Place du Thouin (derrière la cathédrale)", code_postal: "24000", ville: "Périgueux", latitude: 45.1834239, longitude: 0.722629 },
  { id: 4, nom: "Canisite - Aire de camping-cars", rue: "Rue des Prés", code_postal: "24000", ville: "Périgueux", latitude: 45.1877241, longitude: 0.7308651 }

  OM: "Ordures ménagères",
  REC: "Recyclables",
  VERRE: "Verre",
  CARTON: "Grand carton",
  BIO: "Biodéchets",
  TEXTILE: "Vêtements / Textiles",
  PILES: "Piles et batteries"
};

// ---------------------------------------------------------------
// ETAPE 2 : CALCULER LA DISTANCE ENTRE DEUX POINTS GPS (Haversine)
// ---------------------------------------------------------------
function distanceEnMetres(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = (deg) => deg * Math.PI / 180;
  const dLat = toRad(lat2 - lat1);
  const dLon = toRad(lon2 - lon1);
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
            Math.sin(dLon / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

// ---------------------------------------------------------------
// ETAPE 3 : GEOLOCALISER L'UTILISATEUR
// ---------------------------------------------------------------
let userPosition = null;
let currentRadius = 250;
let currentCategory = 'dechets';
let activeTypes = new Set(['OM', 'REC', 'VERRE', 'CARTON', 'BIO', 'DECHETTERIE', 'TEXTILE', 'PILES']);
let map, userMarker;
let markers = [];

const statusEl = document.getElementById('status');
const resultsEl = document.getElementById('results');
const dechetsFiltersEl = document.getElementById('dechets-filters');
const ajouterPointBtn = document.getElementById('ajouter-point-btn');

function initMap(lat, lon) {
  map = L.map('map').setView([lat, lon], 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
  }).addTo(map);

  userMarker = L.circleMarker([lat, lon], {
    radius: 8, color: '#1d4ed8', fillColor: '#3b82f6', fillOpacity: 1
  }).addTo(map).bindPopup("Toi");
}

function iconPourCategorie(categorie, dechetsStr) {
  let emoji = '♻️';
  if (categorie === 'toilette') emoji = '🚻';
  else if (categorie === 'dechetterie') emoji = '🏭';
  else if (categorie === 'canisite') emoji = '🐾';
  else if (dechetsStr === 'TEXTILE') emoji = '👕';
  else if (dechetsStr === 'PILES') emoji = '🔋';
  return L.divIcon({
    html: `<div style="font-size:22px; transform: translate(-50%, -100%);">${emoji}</div>`,
    className: '',
    iconSize: [0, 0]
  });
}

function getResultatsFiltres() {
  if (currentCategory === 'toilettes') {
    return toilettes
      .map(t => ({
        ...t,
        categorie: 'toilette',
        nom: t.type,
        distance: distanceEnMetres(userPosition.lat, userPosition.lon, t.latitude, t.longitude)
      }))
      .filter(t => t.distance <= currentRadius)
      .sort((a, b) => a.distance - b.distance);
  }

  if (currentCategory === 'canisites') {
    return canisites
      .map(c => ({ ...c, categorie: 'canisite', distance: distanceEnMetres(userPosition.lat, userPosition.lon, c.latitude, c.longitude) }))
      .filter(c => c.distance <= currentRadius)
      .sort((a, b) => a.distance - b.distance);
  }

  // categorie "dechets" : on combine points d'apport (filtres par type
  // coche) et dechetteries (si la puce DECHETTERIE est active)
  return dechets
    .map(d => ({ ...d, distance: distanceEnMetres(userPosition.lat, userPosition.lon, d.latitude, d.longitude) }))
    .filter(d => d.distance <= currentRadius)
    .filter(d => {
      if (d.categorie === 'dechetterie') return activeTypes.has('DECHETTERIE');
      // point_apport : garder si au moins un de ses types est coche
      const typesDuPoint = d.dechets.split(';').filter(Boolean);
      return typesDuPoint.some(code => activeTypes.has(code));
    })
    .sort((a, b) => a.distance - b.distance);
}

function afficherResultats() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  resultsEl.innerHTML = '';

  const resultats = getResultatsFiltres();

  if (resultats.length === 0) {
    resultsEl.innerHTML = '<div id="empty">Rien trouvé dans ce rayon avec ces filtres. Essaie un rayon plus large.</div>';
    return;
  }

  resultats.forEach(r => {
    const card = document.createElement('div');
    card.className = 'result-card ' + (r.categorie || '');

    let tagsHtml = '';
    if (r.categorie === 'point_apport') {
      const codes = r.dechets.split(';').filter(Boolean);
      tagsHtml = '<div class="tags">' + codes.map(c => `<span class="tag">${typeLabels[c] || c}</span>`).join('') + '</div>';
    } else if (r.categorie === 'dechetterie') {
      tagsHtml = '<div class="tags"><span class="tag">Accepte tous les déchets</span></div>';
    }

    const nomAffiche = r.categorie === 'toilette' ? r.type : r.nom;
    const adresse = r.numero ? `${r.numero} ${r.rue}, ${r.code_postal} ${r.ville}` : `${r.rue}, ${r.code_postal} ${r.ville}`;

    card.innerHTML = `
      <div class="type">${nomAffiche}</div>
      <div class="adresse">${adresse}</div>
      ${tagsHtml}
      <div class="card-footer">
        <div class="distance">${Math.round(r.distance)} m</div>
        <button class="report-btn">⚠️ Signaler un problème</button>
      </div>
    `;
    card.querySelector('.report-btn').addEventListener('click', () => {
      ouvrirSignalement(nomAffiche, r.latitude, r.longitude);
    });
    resultsEl.appendChild(card);

    const marker = L.marker([r.latitude, r.longitude], { icon: iconPourCategorie(r.categorie, r.dechets) })
      .addTo(map)
      .bindPopup(`${nomAffiche}<br>${Math.round(r.distance)} m`);
    markers.push(marker);
  });
}

function onSuccess(position) {
  userPosition = { lat: position.coords.latitude, lon: position.coords.longitude };
  statusEl.textContent = "Position trouvée ✓";
  initMap(userPosition.lat, userPosition.lon);
  afficherResultats();
}

function onError(err) {
  let message;
  if (err.code === 1) {
    message = "Localisation refusée pour ce site. Va dans les réglages du site (icône à gauche de l'adresse) et autorise la localisation.";
  } else if (err.code === 2) {
    message = "Position indisponible. Vérifie que le GPS est activé et que tu n'es pas en intérieur profond.";
  } else if (err.code === 3) {
    message = "La localisation prend trop de temps. Nouvelle tentative...";
    navigator.geolocation.getCurrentPosition(onSuccess, onFinalError, {
      enableHighAccuracy: true, timeout: 20000, maximumAge: 0
    });
    return;
  } else {
    message = "Erreur de localisation inconnue.";
  }
  statusEl.textContent = message;
}

function onFinalError(err) {
  statusEl.textContent = "Impossible d'obtenir ta position après plusieurs tentatives. Vérifie le GPS et les autorisations du site.";
}

if (navigator.geolocation) {
  navigator.geolocation.getCurrentPosition(onSuccess, onError, {
    enableHighAccuracy: true, timeout: 8000, maximumAge: 0
  });
} else {
  statusEl.textContent = "La géolocalisation n'est pas supportée par ce navigateur.";
}

// Boutons de rayon
document.querySelectorAll('.radius-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.radius-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentRadius = parseInt(btn.dataset.radius, 10);
    if (userPosition) afficherResultats();
  });
});

// Onglets de categorie
document.querySelectorAll('.cat-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentCategory = tab.dataset.cat;
    dechetsFiltersEl.classList.toggle('visible', currentCategory === 'dechets');
    ajouterPointBtn.classList.toggle('visible', currentCategory === 'dechets');
    if (userPosition) afficherResultats();
  });
});

// Etat initial du bouton d'ajout (l'onglet Dechets est actif par defaut)
ajouterPointBtn.classList.toggle('visible', currentCategory === 'dechets');
ajouterPointBtn.addEventListener('click', ouvrirAjoutPoint);

// Puces de type de dechet
document.querySelectorAll('.type-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const type = chip.dataset.type;
    if (activeTypes.has(type)) {
      activeTypes.delete(type);
      chip.classList.remove('active');
    } else {
      activeTypes.add(type);
      chip.classList.add('active');
    }
    if (userPosition) afficherResultats();
  });
});
</script>

</body>
</html>
